databases:
  - name: cost_db
    plan: free

services:
  # Single Unified Web Service (Express Backend + React Frontend Static Site)
  - type: web
    name: ahmed-soliman-cost-app
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && cd ../frontend && npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: cost_db
          property: connectionString
