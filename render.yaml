services:
  # Single Unified Web Service (Express Backend + React Frontend Static Site)
  - type: web
    name: ahmed-soliman-cost-app
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && cd ../frontend && npm install && npm run build
    startCommand: node server.js
    disk:
      name: company-data
      mountPath: /opt/render/project/src/backend/db
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
